name: Update README from rules.json

on:
  push:
    paths:
      - 'main/rules.json'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script to update README
        run: python .scripts/update_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "astradal-bot"
          git config user.email "bot@astradal.org"
          git add README.md
          
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update README from rules.json" && git push)
